name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: false
          tags: flybrain:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: terraform fmt check
        run: terraform -chdir=infra/terraform fmt -check

      - name: terraform init -backend=false
        run: terraform -chdir=infra/terraform init -backend=false

      - name: terraform validate
        run: terraform -chdir=infra/terraform validate
