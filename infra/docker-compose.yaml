version: "3.9"

services:
  flybrain:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: flybrain:dev
    environment:
      - YANDEX_API_KEY
      - YANDEX_FOLDER_ID
      - folder_id
    volumes:
      - ../data:/workspace/data
      - ../results:/workspace/results
    command: ["info"]
